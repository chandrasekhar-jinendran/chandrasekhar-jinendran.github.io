<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
  </style>
</helmet>
<div id="rs-video-root" data-screen-label="t=0s" style="position:absolute; inset:0; background:#0a0a0a;">
  <x-import
    component-from-global-scope="RightStockVideo"
    from="./RightStock.video.jsx"
    aspect="{{ aspect }}"
    primary="{{ primary }}"
    hint-size="100%,100%">
  </x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 720 },
  &quot;aspect&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;16:9&quot;, &quot;1:1&quot;], &quot;default&quot;: &quot;16:9&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;primary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#0d9488&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    return {
      aspect: this.props.aspect ?? '16:9',
      primary: this.props.primary ?? '#0d9488',
    };
  }
}
</script>
</body>
</html>
