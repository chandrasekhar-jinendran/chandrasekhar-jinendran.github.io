<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — Chandrasekhar Jinendran</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    @font-face { font-family:'Inter'; font-weight:400; font-display:swap; src:url("assets/anim/fonts/inter-400.ttf") format('truetype'); }
    @font-face { font-family:'Inter'; font-weight:800; font-display:swap; src:url("assets/anim/fonts/inter-800.ttf") format('truetype'); }
    *{box-sizing:border-box;margin:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:'Inter','Segoe UI',system-ui,sans-serif;background:#E8ECE4;color:#545B51;padding:24px;text-align:center}
    .wrap{max-width:480px}
    .code{font-weight:800;font-size:clamp(3rem,12vw,5.5rem);letter-spacing:-0.04em;color:#15452A;line-height:1}
    .code span{color:#2F9655}
    h1{font-weight:800;font-size:clamp(1.4rem,4vw,2rem);letter-spacing:-0.02em;color:#15452A;margin:14px 0 10px}
    p{font-size:1.0625rem;line-height:1.55;margin:0 0 28px}
    a{display:inline-block;font-weight:600;font-size:15px;color:#fff;background:#15452A;
      padding:12px 22px;border-radius:999px;text-decoration:none;transition:background .15s ease}
    a:hover{background:#0E3320}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404<span>.</span></div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a href="/">← Back to home</a>
  </div>
</body>
</html>
