<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;width:100%;overflow:hidden;background:#0b1f17}
    body{font-family:'DM Sans',system-ui,sans-serif}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</helmet>
<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 100% at 50% 0%,#11362a,#0a1c15)">
  <div style="{{ stageStyle }}">{{ scene }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:687}}">
class Component extends DCLogic {
  state = { now: 0, scale: 1 };
  W = 1000; H = 687; LOOP = 10.5;
  clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  eo(x){ return 1 - Math.pow(1 - this.clamp(x,0,1), 3); }
  typed(full,t,start,cps){ const n=this.clamp(Math.floor((t-start)*cps),0,full.length); return full.slice(0,n); }
  componentDidMount(){ this.fit(); this._r=()=>this.fit(); window.addEventListener('resize',this._r); this.t0=performance.now();
    const tick=()=>{ this.setState({ now:((performance.now()-this.t0)/1000)%this.LOOP }); this._raf=requestAnimationFrame(tick); }; this._raf=requestAnimationFrame(tick); }
  componentWillUnmount(){ cancelAnimationFrame(this._raf); window.removeEventListener('resize',this._r); }
  fit(){ this.setState({ scale: Math.min(window.innerWidth/this.W, window.innerHeight/this.H) }); }

  scene(){
    const h=React.createElement, t=this.state.now;
    const C={ ink:'#0f2e22', green:'#2F9655', greenDk:'#15452A', sub:'#5c7064', mut:'#9aab9f', line:'#e3ece6', tint:'#eaf4ee', panel:'#fff', code:'#0c2419' };
    const userMsg=this.typed("How many Aurora Runners are in stock?",t,0.4,22);
    const showUser=t>0.4;
    const callOn=t>2.4; const callP=this.clamp((t-2.4)/0.5,0,1);
    const running=t>2.9 && t<4.2;
    const dataOn=t>4.2; const dataP=this.clamp((t-4.2)/0.6,0,1);
    const ansOn=t>6.0; const ansP=this.clamp((t-6.0)/0.6,0,1);
    const rows=[['Aurora Runner','SKU 48201','128'],['Trail Glove 4','SKU 48207','1,240'],['Cloud Tee','SKU 50114','8']];
    return h('div',{style:{position:'absolute',inset:0,padding:'34px 44px',display:'flex',flexDirection:'column',gap:14}},
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{style:{width:40,height:40,borderRadius:11,background:'#d97757',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:20}},'C'),
        h('div',null,h('div',{style:{fontSize:22,fontWeight:700,color:C.ink}},'Claude + Custom MCP'),h('div',{style:{fontSize:14,color:C.mut}},'Live data · real actions'))),
      // user bubble
      showUser?h('div',{style:{display:'flex',justifyContent:'flex-end'}},
        h('div',{style:{maxWidth:'72%',background:C.greenDk,color:'#fff',borderRadius:'16px 16px 5px 16px',padding:'13px 18px',fontSize:18,fontWeight:500}},userMsg||' ')):null,
      // tool call card
      callOn?h('div',{style:{opacity:callP,transform:`translateY(${(1-this.eo(callP))*10}px)`,background:C.code,borderRadius:14,overflow:'hidden',border:'1px solid rgba(255,255,255,0.08)'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'11px 16px',borderBottom:'1px solid rgba(255,255,255,0.08)'}},
          running?h('div',{style:{width:14,height:14,borderRadius:'50%',border:'2px solid rgba(94,234,212,0.3)',borderTopColor:'#5eead4',animation:'spin 0.7s linear infinite'}}):h('div',{style:{width:14,height:14,borderRadius:'50%',background:'#34d399'}}),
          h('span',{style:{fontFamily:"'DM Mono',monospace",fontSize:14,color:'#5eead4'}},'MCP · inventory_server'),
          h('span',{style:{marginLeft:'auto',fontSize:12,color:C.mut,fontFamily:"'DM Mono',monospace"}},running?'calling…':'200 OK')),
        h('div',{style:{padding:'12px 16px',fontFamily:"'DM Mono',monospace",fontSize:15,color:'#cfe8dc'}},
          h('span',{style:{color:'#8fe3b4'}},'get_stock'),'(',h('span',{style:{color:'#fbbf77'}},'sku'),'=',h('span',{style:{color:'#9ad'}},'"48201"'),')')) :null,
      // live data table
      dataOn?h('div',{style:{opacity:dataP,transform:`translateY(${(1-this.eo(dataP))*10}px)`,background:C.panel,border:`1.5px solid ${C.line}`,borderRadius:14,overflow:'hidden',boxShadow:'0 8px 20px rgba(15,46,34,0.06)'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',background:C.tint,borderBottom:`1px solid ${C.line}`}},
          h('span',{style:{width:8,height:8,borderRadius:4,background:C.green}}),
          h('span',{style:{fontSize:13,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.greenDk}},'Live inventory · just now')),
        rows.map((r,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',padding:'11px 16px',borderTop:i?`1px solid ${C.line}`:'none',opacity:this.clamp((dataP*3-i),0,1),background:i===0?C.tint:'#fff'}},
          h('span',{style:{flex:1,fontSize:17,fontWeight:i===0?700:500,color:C.ink}},r[0]),
          h('span',{style:{width:140,fontFamily:"'DM Mono',monospace",fontSize:14,color:C.mut}},r[1]),
          h('span',{style:{width:80,textAlign:'right',fontSize:19,fontWeight:700,color:i===0?C.green:C.ink,fontFamily:"'DM Mono',monospace"}},r[2])))) :null,
      // answer
      ansOn?h('div',{style:{marginTop:'auto',opacity:ansP,display:'flex',gap:12,alignItems:'flex-start'}},
        h('div',{style:{width:30,height:30,borderRadius:8,background:'#d97757',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:15,flex:'none'}},'C'),
        h('div',{style:{background:C.panel,border:`1.5px solid ${C.line}`,borderRadius:'5px 16px 16px 16px',padding:'13px 18px',fontSize:18,color:C.ink,lineHeight:1.45}},'You have ',h('b',{style:{color:C.green}},'128 Aurora Runners'),' in stock — pulled live from your warehouse this second.')) :null
    );
  }
  renderVals(){ return { scene:this.scene(), stageStyle:{ width:this.W+'px', height:this.H+'px', transform:`scale(${this.state.scale})`, transformOrigin:'center', background:'#f4f8f5', borderRadius:'18px', position:'relative', overflow:'hidden', flex:'none', boxShadow:'0 30px 70px rgba(0,0,0,0.4)' } }; }
}
</script>
</body>
</html>
