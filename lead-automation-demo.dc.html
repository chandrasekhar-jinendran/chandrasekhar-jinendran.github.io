<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;width:100%;overflow:hidden;background:#0b1f17}
    body{font-family:'DM Sans',system-ui,sans-serif}
  </style>
</helmet>
<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 100% at 50% 0%,#11362a,#0a1c15)">
  <div style="{{ stageStyle }}">{{ scene }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:687}}">
class Component extends DCLogic {
  state = { now: 0, scale: 1 };
  W = 1000; H = 687; LOOP = 8.5;
  clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  eo(x){ return 1 - Math.pow(1 - this.clamp(x,0,1), 3); }
  componentDidMount(){ this.fit(); this._r=()=>this.fit(); window.addEventListener('resize',this._r); this.t0=performance.now();
    const tick=()=>{ this.setState({ now:((performance.now()-this.t0)/1000)%this.LOOP }); this._raf=requestAnimationFrame(tick); }; this._raf=requestAnimationFrame(tick); }
  componentWillUnmount(){ cancelAnimationFrame(this._raf); window.removeEventListener('resize',this._r); }
  fit(){ this.setState({ scale: Math.min(window.innerWidth/this.W, window.innerHeight/this.H) }); }

  scene(){
    const h=React.createElement, t=this.state.now;
    const C={ ink:'#0f2e22', green:'#2F9655', greenDk:'#15452A', sub:'#5c7064', mut:'#9aab9f', line:'#e3ece6', tint:'#eaf4ee', panel:'#fff' };
    const nodes=[
      { x:90, lab:'Capture', sub:'Website form', ic:h('path',{d:'M4 5h16v4H4zM4 13h16v6H4z',stroke:C.green,strokeWidth:2,fill:'none',strokeLinejoin:'round'}) },
      { x:380, lab:'Qualify', sub:'AI scoring', ic:h('path',{d:'M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z',stroke:C.green,strokeWidth:2,fill:'none',strokeLinejoin:'round'}) },
      { x:670, lab:'Route', sub:'Assign owner', ic:h('path',{d:'M6 3v6a4 4 0 0 0 4 4h8M18 9l3 4-3 4',stroke:C.green,strokeWidth:2,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'}) },
    ];
    const NODE_W=240, NY=250;
    // token progress 0..1 across full path, cycling
    const cyc=this.clamp((t-1.0)/5.5,0,1);
    const seg=cyc*2; // 0..2 (two hops)
    const node=(n,i)=>{
      const active=(seg>=i-0.15 && seg<=i+0.6) || (i===2 && cyc>0.9);
      return h('div',{key:i,style:{position:'absolute',left:n.x,top:NY,width:NODE_W}},
        h('div',{style:{background:C.panel,border:`2px solid ${active?C.green:C.line}`,borderRadius:18,padding:'18px 20px',boxShadow:active?'0 14px 30px rgba(47,150,85,0.18)':'0 6px 16px rgba(15,46,34,0.05)',transform:`translateY(${active?-4:0}px)`,transition:'none'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:12}},
            h('div',{style:{width:46,height:46,borderRadius:12,background:active?C.tint:'#f3f6f4',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}},h('svg',{width:24,height:24,viewBox:'0 0 24 24'},n.ic)),
            h('div',null,h('div',{style:{fontSize:13,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:C.mut}},'n8n'),h('div',{style:{fontSize:22,fontWeight:700,color:C.ink}},n.lab))),
          h('div',{style:{fontSize:15,color:C.sub,marginTop:10}},n.sub)),
        // qualify score badge
        (i===1 && seg>1.0)?h('div',{style:{position:'absolute',right:-8,top:-14,background:C.green,color:'#fff',fontSize:14,fontWeight:700,padding:'5px 12px',borderRadius:999,boxShadow:'0 6px 14px rgba(47,150,85,0.4)'}},'Score 92'):null,
        // route owner avatar
        (i===2 && cyc>0.92)?h('div',{style:{position:'absolute',right:-6,top:-16,display:'flex',alignItems:'center',gap:7,background:C.greenDk,color:'#fff',fontSize:14,fontWeight:600,padding:'6px 12px 6px 6px',borderRadius:999}},h('span',{style:{width:24,height:24,borderRadius:'50%',background:'linear-gradient(135deg,#5eead4,#2F9655)'}}),'Maya'):null);
    };
    // traveling token
    const path=[[90+NODE_W,NY+44],[380,NY+44],[380+NODE_W,NY+44],[670,NY+44]];
    let tx,ty;
    if(seg<=1){ const a=path[0],b=path[1],p=this.eo(this.clamp(seg,0,1)); tx=a[0]+(b[0]-a[0])*p; ty=a[1]; }
    else { const a=path[2],b=path[3],p=this.eo(this.clamp(seg-1,0,1)); tx=a[0]+(b[0]-a[0])*p; ty=a[1]; }
    const tokenOn=cyc>0.02 && cyc<0.96;
    const connector=(x1,x2)=>h('div',{style:{position:'absolute',left:x1,top:NY+41,width:x2-x1,height:6}},
      h('div',{style:{position:'absolute',inset:0,borderTop:`3px dashed ${C.line}`}}));

    return h('div',{style:{position:'absolute',inset:0,padding:'44px 54px'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{style:{width:40,height:40,borderRadius:11,background:C.greenDk,display:'flex',alignItems:'center',justifyContent:'center'}},
          h('svg',{width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:'#fff',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('circle',{cx:6,cy:6,r:2.4}),h('circle',{cx:18,cy:18,r:2.4}),h('circle',{cx:18,cy:6,r:2.4}),h('path',{d:'M8.4 6H15M16 8v8M8 8l8 8'}))),
        h('div',null,h('div',{style:{fontSize:24,fontWeight:700,color:C.ink}},'Lead Management Automation'),h('div',{style:{fontSize:14,color:C.mut}},'Capture → qualify → route, hands-off'))),
      connector(90+NODE_W,380), connector(380+NODE_W,670),
      nodes.map((n,i)=>node(n,i)),
      tokenOn?h('div',{style:{position:'absolute',left:tx-12,top:ty-12,width:24,height:24,borderRadius:'50%',background:C.green,boxShadow:`0 0 0 8px rgba(47,150,85,0.18),0 0 16px ${C.green}`}},
        h('div',{style:{position:'absolute',inset:6,borderRadius:'50%',background:'#fff'}})):null,
      // status footer
      h('div',{style:{position:'absolute',left:54,right:54,bottom:40,display:'flex',alignItems:'center',gap:14,background:cyc>0.92?C.greenDk:C.panel,border:`1.5px solid ${cyc>0.92?C.greenDk:C.line}`,borderRadius:14,padding:'16px 20px',transition:'none'}},
        h('div',{style:{width:30,height:30,borderRadius:8,background:C.green,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}},
          h('svg',{width:17,height:17,viewBox:'0 0 24 24',fill:'none',stroke:'#fff',strokeWidth:3,strokeLinecap:'round',strokeLinejoin:'round'},h('path',{d:'M5 13l4 4L19 7'}))),
        h('span',{style:{fontSize:17,fontWeight:600,color:cyc>0.92?'#eaf4ee':C.ink}},cyc>0.92?'Lead routed to Maya in 1.2s — zero manual touch.':'New lead captured · qualifying automatically…'))
    );
  }
  renderVals(){ return { scene:this.scene(), stageStyle:{ width:this.W+'px', height:this.H+'px', transform:`scale(${this.state.scale})`, transformOrigin:'center', background:'#f4f8f5', borderRadius:'18px', position:'relative', overflow:'hidden', flex:'none', boxShadow:'0 30px 70px rgba(0,0,0,0.4)' } }; }
}
</script>
</body>
</html>
