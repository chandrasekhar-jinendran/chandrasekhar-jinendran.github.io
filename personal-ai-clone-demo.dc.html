<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;width:100%;overflow:hidden;background:#08130d}
    body{font-family:'DM Sans',system-ui,sans-serif}
  </style>
</helmet>
<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 100% at 50% 0%,#0f3024,#070f0a)">
  <div style="{{ stageStyle }}">{{ scene }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:687}}">
class Component extends DCLogic {
  state = { now: 0, scale: 1 };
  W = 1000; H = 687; LOOP = 9.5;
  clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  eo(x){ return 1 - Math.pow(1 - this.clamp(x,0,1), 3); }
  eob(x){ x=this.clamp(x,0,1); const c=1.70158,c3=c+1; return 1+c3*Math.pow(x-1,3)+c*Math.pow(x-1,2); }
  componentDidMount(){ this.fit(); this._r=()=>this.fit(); window.addEventListener('resize',this._r); this.t0=performance.now();
    const tick=()=>{ this.setState({ now:((performance.now()-this.t0)/1000)%this.LOOP }); this._raf=requestAnimationFrame(tick); }; this._raf=requestAnimationFrame(tick); }
  componentWillUnmount(){ cancelAnimationFrame(this._raf); window.removeEventListener('resize',this._r); }
  fit(){ this.setState({ scale: Math.min(window.innerWidth/this.W, window.innerHeight/this.H) }); }

  scene(){
    const h=React.createElement, t=this.state.now;
    const C={ ink:'#0f2e22', green:'#2F9655', greenDk:'#15452A', acc:'#5eead4', sub:'#9fb6ab', mut:'#6f8a7d', line:'rgba(255,255,255,0.1)' };
    const mods=[
      { lab:'Video synthesis', sub:'1080p · 30fps', at:1.0, ic:h('path',{d:'M4 6h11v12H4zM15 9l5-3v12l-5-3',stroke:'#fff',strokeWidth:2,fill:'none',strokeLinejoin:'round',strokeLinecap:'round'}) },
      { lab:'Voice cloning', sub:'natural prosody', at:2.0, ic:h('path',{d:'M12 4a3 3 0 0 1 3 3v5a3 3 0 0 1-6 0V7a3 3 0 0 1 3-3zM5 11a7 7 0 0 0 14 0M12 18v3',stroke:'#fff',strokeWidth:2,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'}) },
      { lab:'Image generation', sub:'face-consistent', at:3.0, ic:h('g',{stroke:'#fff',strokeWidth:2,fill:'none',strokeLinejoin:'round'},h('rect',{x:3,y:4,width:18,height:16,rx:2}),h('circle',{cx:8.5,cy:9.5,r:1.8}),h('path',{d:'M5 18l5-5 3 3 3-4 4 6'})) },
    ];
    const ringP=this.clamp((t-0.4)/3.4,0,1);
    const scanY=20+ ((Math.sin(t*1.6)*0.5+0.5)*160);
    const ready=t>4.6; const readyP=this.clamp((t-4.6)/0.7,0,1);
    const portrait=h('div',{style:{position:'relative',width:230,height:230}},
      // blob
      h('div',{style:{position:'absolute',inset:-22,borderRadius:'42% 58% 56% 44%/52% 44% 56% 48%',background:`linear-gradient(135deg,${C.green},${C.greenDk})`,filter:'blur(2px)',transform:`rotate(${t*8}deg)`,opacity:0.9}}),
      h('div',{style:{position:'absolute',inset:0,borderRadius:'50%',overflow:'hidden',background:'linear-gradient(160deg,#1c5a3c,#0c2c1d)',border:'2px solid rgba(94,234,212,0.5)'}},
        // face glyph
        h('svg',{width:230,height:230,viewBox:'0 0 24 24',style:{opacity:0.4+0.5*ringP}},h('g',{fill:'none',stroke:C.acc,strokeWidth:0.7},h('circle',{cx:12,cy:9.5,r:3.4}),h('path',{d:'M5.5 19c0-3.6 2.9-5.5 6.5-5.5s6.5 1.9 6.5 5.5'}))),
        // scan line
        ready?null:h('div',{style:{position:'absolute',left:0,right:0,top:scanY,height:3,background:`linear-gradient(90deg,transparent,${C.acc},transparent)`,boxShadow:`0 0 12px ${C.acc}`}})),
      ready?h('div',{style:{position:'absolute',right:-6,bottom:6,width:54,height:54,borderRadius:'50%',background:C.green,display:'flex',alignItems:'center',justifyContent:'center',transform:`scale(${this.eob(readyP)})`,boxShadow:'0 8px 20px rgba(47,150,85,0.5)',border:'3px solid #0f3024'}},
        h('svg',{width:26,height:26,viewBox:'0 0 24 24',fill:'#fff'},h('path',{d:'M8 5v14l11-7z'}))):null);

    return h('div',{style:{position:'absolute',inset:0,padding:'44px 54px',display:'flex',flexDirection:'column'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('span',{style:{width:9,height:9,borderRadius:5,background:ready?C.acc:'#f59e0b',boxShadow:`0 0 10px ${ready?C.acc:'#f59e0b'}`}}),
        h('span',{style:{fontSize:15,fontWeight:600,letterSpacing:'0.14em',textTransform:'uppercase',color:C.sub}},'Personal AI Clone')),
      h('div',{style:{flex:1,display:'flex',alignItems:'center',gap:54}},
        h('div',{style:{display:'flex',justifyContent:'center',flex:'none'}},portrait),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:40,fontWeight:700,color:'#fff',letterSpacing:'-0.02em',lineHeight:1.1}},ready?'Your digital twin is ready.':'Building your digital twin…'),
          h('div',{style:{display:'flex',flexDirection:'column',gap:13,marginTop:26}},
            mods.map((m,i)=>{ const p=this.clamp((t-m.at)/0.9,0,1); const done=t>m.at+0.9||ready;
              return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:14,opacity:0.35+0.65*this.clamp((t-m.at+0.4)/0.5,0,1)}},
                h('div',{style:{width:42,height:42,borderRadius:11,background:done?C.green:'rgba(255,255,255,0.08)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none',transition:'none'}},
                  h('svg',{width:22,height:22,viewBox:'0 0 24 24'},m.ic)),
                h('div',{style:{flex:1}},
                  h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
                    h('span',{style:{fontSize:18,fontWeight:600,color:'#fff'}},m.lab),
                    h('span',{style:{fontSize:13,fontFamily:"'DM Mono',monospace",color:done?C.acc:C.mut}},done?'done':Math.round(p*100)+'%')),
                  h('div',{style:{height:6,background:'rgba(255,255,255,0.1)',borderRadius:3,marginTop:7,overflow:'hidden'}},
                    h('div',{style:{height:'100%',width:(done?100:p*100)+'%',background:`linear-gradient(90deg,${C.acc},${C.green})`,borderRadius:3}}))));
            }))))
    );
  }
  renderVals(){ return { scene:this.scene(), stageStyle:{ width:this.W+'px', height:this.H+'px', transform:`scale(${this.state.scale})`, transformOrigin:'center', background:'#0c2419', borderRadius:'18px', position:'relative', overflow:'hidden', flex:'none', boxShadow:'0 30px 70px rgba(0,0,0,0.45)' } }; }
}
</script>
</body>
</html>
